<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو الفخامة</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { background: #262626; border-radius: 15px; padding: 20px; margin: 15px auto; max-width: 400px; border-bottom: 4px solid #d4af37; }
        h1 { color: #d4af37; }
        .price { color: #d4af37; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>☕ كافيه السعادة</h1>
    <div class="card">
        <h3>اسبريسو دبل</h3>
        <p>بُن برازيلي فاخر</p>
        <span class="price">35 EGP</span>
    </div>
    <div class="card">
        <h3>مولتن كيك</h3>
        <p>شوكولاتة سايحة ساخنة</p>
        <span class="price">60 EGP</span>
    </div>
</body>
</html>
